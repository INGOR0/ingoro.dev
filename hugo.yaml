baseURL: "https://ingoro.dev/"
title: "ingoro.dev"
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

params:
  env: production
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  showtoc: true
  profileMode:
    enabled: true
    title: "INGORO"
    subtitle: "Only by breaking something can we get to fix it"

menus:
  main:
    - name: Devlogs
      url: /devlogs/
      weight: 1
    - name: Tutorials
      url: /tutorials/
      weight: 2
